name: Deploy CTNet Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'continuous-time-networks/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: continuous-time-networks
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
          
      - name: Build library
        run: npm run build
        
      - name: Build documentation site
        run: |
          # Prepare directories
          npm run docs:prepare
          
          # Copy demos/examples
          npm run docs:copy-demos
          
          # Copy library files
          npm run docs:copy-lib
          
          # Copy network examples
          npm run docs:copy-networks
      
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: continuous-time-networks/docs
